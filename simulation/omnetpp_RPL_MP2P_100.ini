# Regular UDP traffic
**.host[*].numApps = 1
**.host[*].app[0].typename = "UdpBasicApp"
**.host[*].app[0].destAddresses = "sink[0]"
**.host[*].app[0].destPort = 1000
**.host[*].app[0].messageLength = 56B
**.host[*].app[0].sendInterval = 55s
**.host[*].app[0].startTime = uniform(0s,90s)
**.host[*].app[0].stopTime = 3550s

**.sink[*].numApps = 1
**.sink[*].app[0].typename = "UdpSink"
**.sink[*].app[0].localPort = 1000

# Energy model
**.host[*].energyStorage.typename = "IdealEpEnergyStorage"
**.host[*].energyStorage.nominalCapacity = 1000J
**.host[*].energyStorage.initialCapacity = 1000J
**.host[*].wlan[*].radio.energyConsumer.typename = "StateBasedEpEnergyConsumer"

**.Attack[*].energyStorage.typename = "IdealEpEnergyStorage"
**.Attack[*].energyStorage.nominalCapacity = 1000J
**.Attack[*].energyStorage.initialCapacity = 1000J
**.Attack[*].wlan[*].radio.energyConsumer.typename = "StateBasedEpEnergyConsumer"

# Visualization options
*.visualizer.dataLinkVisualizer[*].displayLinks = true
*.visualizer.physicalLinkVisualizer[*].displayLinks = true
*.visualizer.mediumVisualizer.displayCommunicationRanges = true
*.visualizer.networkRouteVisualizer.displayRoutes = true

*.visualizer.*.numDataLinkVisualizers = 4
*.visualizer.*.dataLinkVisualizer[*].displayLinks = true
*.visualizer.*.dataLinkVisualizer[*].activityLevel = "peer"

# Packet filters used by the visualizer
*.visualizer.*.dataLinkVisualizer[0].packetFilter = "UDP*"
*.visualizer.*.dataLinkVisualizer[0].*Color = "blue"

*.visualizer.*.dataLinkVisualizer[1].packetFilter = "DIO* or DIS* or DAO*"
*.visualizer.*.dataLinkVisualizer[1].*Color = "green"

*.visualizer.*.dataLinkVisualizer[2].packetFilter = "RERR* or ICMP*"
*.visualizer.*.dataLinkVisualizer[2].*Color = "red"

*.visualizer.*.dataLinkVisualizer[3].packetFilter = "UDP*"
*.visualizer.*.dataLinkVisualizer[3].*Color = "orange"

# Metrics recorded for dataset generation
**.app[*].packetSent:count.record = true
**.app[*].packetReceived:count.record = true
**.host[*].app[0].recordStats = true
**.sink[*].app[0].recordStats = true

**.host[*].app[0].endToEndDelay.result-recording-modes = all
**.sink[*].app[0].endToEndDelay.result-recording-modes = all
**.endToEndDelay:vector.record = true
**.endToEndDelay:stats.record = true

**.sink[*].app[0].throughput.result-recording-modes = all
**.throughput:vector.record = true
**.throughput:stats.record = true

**.energyStorage.remainingEnergyCapacity.result-recording-modes = all
**.energyStorage.energyConsumption.result-recording-modes = all

**.scalar-recording = true
**.vector-recording = true

output-scalar-file = ${resultdir}/${configname}-${runnumber}.sca
output-vector-file = ${resultdir}/${configname}-${runnumber}.vec



# Experimental scenarios

# Baseline scenario: normal operation
[Config _MP2P_Normal_100]
sim-time-limit = 3600s

**.host[*].numApps = 1
**.host[*].app[0].typename = "UdpBasicApp"
**.host[*].app[0].destAddresses = "sink[0]"
**.host[*].app[0].destPort = 1000
**.host[*].app[0].messageLength = 56B
**.host[*].app[0].sendInterval = 55s
**.host[*].app[0].startTime = uniform(0s,90s)

**.sink[*].numApps = 1
**.sink[*].app[0].typename = "UdpSink"
**.sink[*].app[0].localPort = 1000

**.host[*].app[0].recordStats = true
**.host[*].app[0].endToEndDelay.result-recording-modes = all
**.sink[*].app[0].recordStats = true
**.sink[*].app[0].throughput.result-recording-modes = all

**.host[*].energyStorage.typename = "IdealEpEnergyStorage"
**.host[*].energyStorage.nominalCapacity = 1000J   
**.host[*].energyStorage.initialCapacity = 1000J   
**.host[*].wlan[*].radio.energyConsumer.typename = "StateBasedEpEnergyConsumer"
**.host[*].energyStorage.remainingEnergyCapacity.result-recording-modes = all
**.host[*].energyStorage.energyConsumption.result-recording-modes = all


# Scenario 1: UDP flooding from host[4]
[Config _MP2P_Static_FLOODING_100]
extends = _MP2P_Normal_100
description = "UDP flooding scenario generated by host[4] after the initial network setup"
sim-time-limit = 3600s

# Extra UDP application used by host[4] to increase traffic load
**.host[4].numApps = 2
**.host[4].app[1].typename = "UdpBasicApp"
**.host[4].app[1].destAddresses = "sink[0]"
**.host[4].app[1].destPort = 1000
**.host[4].app[1].messageLength = 152B
**.host[4].app[1].startTime = 900s
**.host[4].app[1].stopTime = 3550s
**.host[4].app[1].sendInterval = 0.02s

**.host[4].app[1].packetSent:count.record = true
**.host[4].app[1].recordStats = true
**.sink[*].app[0].packetReceived:count.record = true
**.sink[*].app[0].recordStats = true
**.sink[*].app[0].throughput.result-recording-modes = all
**.scalar-recording = true
**.vector-recording = true


# Scenario 2: manipulated MAC backoff on host[4]
[Config _MP2P_Static_BACKOFF_MANIPULADO_100]
extends = _MP2P_Normal_100
description = "Backoff manipulation scenario with host[4] using reduced CSMA/CA contention parameters"
sim-time-limit = 3600s

**.host[*].numApps = 1
**.host[*].app[0].typename = "UdpBasicApp"
**.host[*].app[0].destPort = 1000
**.host[*].app[0].messageLength = 56B
**.host[*].app[0].sendInterval = 55s
**.host[*].app[0].startTime = uniform(300s,400s)
**.host[*].app[0].stopTime = 3550s

**.sink[*].numApps = 1
**.sink[*].app[0].typename = "UdpSink"
**.sink[*].app[0].localPort = 1000

# Reduced CSMA/CA backoff values for the selected node
**.host[4].numApps = 1
**.host[4].wlan[0].mac.macMinBE = 0
**.host[4].wlan[0].mac.macMaxBE = 0
**.host[4].wlan[0].mac.macMaxCSMABackoffs = 0

# Higher traffic rate for the node using manipulated backoff
**.host[4].app[0].sendInterval = 5s
**.host[4].app[0].messageLength = 152B
**.host[4].app[0].startTime = 600s


# Scenario 3: blackhole behavior using host[4]
[Config _MP2P_Static_BLACKHOLE_100]
extends = _MP2P_Normal_100
description = "Blackhole scenario where part of the traffic is redirected to host[4] and then dropped"
sim-time-limit = 3600s

**.host[*].numApps = 1
**.host[*].app[0].typename = "UdpBasicApp"
**.host[*].app[0].destPort = 1000
**.host[*].app[0].messageLength = 56B
**.host[*].app[0].sendInterval = 55s
**.host[*].app[0].startTime = uniform(300s,400s)
**.host[*].app[0].stopTime = 3550s

**.sink[*].numApps = 1
**.sink[*].app[0].typename = "UdpSink"
**.sink[*].app[0].localPort = 1000

# Traffic redirection used to emulate packet loss through the blackhole node
**.host[0..3].app[0].destAddresses = "host[4]"
**.host[5..54].app[0].destAddresses = "host[4]"   # part of the topology sends traffic to the blackhole
**.host[55..99].app[0].destAddresses = "sink[0]"  # remaining nodes keep the normal destination

# host[4] does not run an application, so redirected packets are not delivered
**.host[4].numApps = 0


# Scenario 4: wormhole-like tunnel between host[4] and host[99]
[Config _MP2P_Static_WORMHOLE_100]
extends = _MP2P_Normal_100
description = "Wormhole-like scenario using an additional UDP flow between host[4] and host[99]"
sim-time-limit = 3600s

**.host[*].app[0].typename = "UdpBasicApp"
**.host[*].app[0].destAddresses = "sink[0]"
**.host[*].app[0].destPort = 1000
**.host[*].app[0].messageLength = 56B
**.host[*].app[0].sendInterval = 55s
**.host[*].app[0].startTime = uniform(600s,800s)
**.host[*].app[0].stopTime = 3550s

**.sink[*].numApps = 1
**.sink[*].app[0].typename = "UdpSink"
**.sink[*].app[0].localPort = 1000

# Additional flow between a near node and an edge node of the grid
**.host[4].numApps = 2
**.host[99].numApps = 2

**.host[4].app[1].typename = "UdpBasicApp"
**.host[4].app[1].destAddresses = "host[99]"
**.host[4].app[1].destPort = 2000
**.host[4].app[1].messageLength = 120B
**.host[4].app[1].sendInterval = 0.5s
**.host[4].app[1].startTime = 900s
**.host[4].app[1].stopTime = 3550s

**.host[99].app[1].typename = "UdpSink"
**.host[99].app[1].localPort = 2000

# Extra counters for the wormhole traffic
**.host[4].app[1].packetSent:count.record = true
**.host[99].app[1].packetReceived:count.record = true
**.sink[*].app[0].packetReceived:count.record = true
**.app[*].packetSent:count.record = true
**.app[*].packetReceived:count.record = true