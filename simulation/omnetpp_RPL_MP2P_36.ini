[General]
network = RplNetwork36  
sim-time-limit = 3600s

# Basic simulation settings for the 36-node topology
**.numNodes = 36      # Number of host nodes in the 6x6 grid
warmup-period = 80s   # Initial period used for network stabilization
repeat = 1000         
num-rngs = 10

**.mobility.rng-0 = 1
**.wlan[*].mac.rng-0 = 2

# Network layer settings
**.hasIpv6 = true
**.hasIpv4 = false
**.mtu = 1500B

**.neighbourDiscovery.raEnabled = false
**.neighbourDiscovery.addRandomDelays = true
**.neighbourDiscovery.skipDad = true

# Radio and physical layer settings
**.radioMedium.typename = "Ieee802154NarrowbandDimensionalRadioMedium"
**.radio.typename = "Ieee802154NarrowbandDimensionalRadio"

# Log-normal path-loss model used for the wireless channel
**.radioMedium.backgroundNoise.power = -110dBm
**.radioMedium.attenuation.typename = "LogNormalShadowing"
**.radioMedium.attenuation.pathLossExponent = 3.5  
**.radioMedium.attenuation.sigma = 6.0  

# MAC layer settings
**.wlan[*].typename = "Ieee802154NarrowbandInterface"
**.wlan[*].mac.typename = "Ieee802154Mac"

# IEEE 802.15.4 radio parameters
**.wlan[0].radio.transmitter.bitrate = 250kbps  
**.wlan[0].radio.receiver.sensitivity = -85dBm   
**.wlan[0].radio.transmitter.power = 1mW       

# RPL routing settings
**.sink[*].rpl.isRoot = true
**.sink[*].rpl.storing = true
**.rpl.numDaoRetransmitAttempts = 10
**.rpl.daoEnabled = true
**.rpl.poisoning = false
**.rpl.useBackupAsPreferred = false
**.rpl.networkProtocolModule = "^.ipv6.ipv6"
**.rpl.routingTableModule = "^.ipv6.routingTable"
**.rpl.drawConnectors = true

# Topology and mobility limits
**.numSinks = 1
**.sensor[*].mobility.typename = "StationaryMobility"
**.sink[*].mobility.typename   = "StationaryMobility"
**.mobility.constraintAreaMinX = 0m
**.mobility.constraintAreaMinY = 0m
**.mobility.constraintAreaMaxX = 500m  # Area used by the 6x6 topology
**.mobility.constraintAreaMaxY = 500m

# Mobility models
*.sink[*].mobility.initialZ = 0m
*.host[*].mobility.typename = "StationaryMobility"
*.host[*].mobility.initFromDisplayString = false
*.host[*].mobility.initialZ = 0m

# Sink position near the center of the grid
*.sink[0].mobility.initialX = 140m
*.sink[0].mobility.initialY = 120m

# Node placement: 6x6 grid with 40 m spacing

# Row 0 (Y = 0m)
*.host[0].mobility.initialX = 40m
*.host[0].mobility.initialY = 0m
*.host[1].mobility.initialX = 80m
*.host[1].mobility.initialY = 0m
*.host[2].mobility.initialX = 120m
*.host[2].mobility.initialY = 0m
*.host[3].mobility.initialX = 160m
*.host[3].mobility.initialY = 0m
*.host[4].mobility.initialX = 200m
*.host[4].mobility.initialY = 0m
*.host[5].mobility.initialX = 240m
*.host[5].mobility.initialY = 0m

# Row 1 (Y = 40m)
*.host[6].mobility.initialX = 40m
*.host[6].mobility.initialY = 40m
*.host[7].mobility.initialX = 80m
*.host[7].mobility.initialY = 40m
*.host[8].mobility.initialX = 120m
*.host[8].mobility.initialY = 40m
*.host[9].mobility.initialX = 160m
*.host[9].mobility.initialY = 40m
*.host[10].mobility.initialX = 200m
*.host[10].mobility.initialY = 40m
*.host[11].mobility.initialX = 240m
*.host[11].mobility.initialY = 40m

# Row 2 (Y = 80m)
*.host[12].mobility.initialX = 40m
*.host[12].mobility.initialY = 80m
*.host[13].mobility.initialX = 80m
*.host[13].mobility.initialY = 80m
*.host[14].mobility.initialX = 120m
*.host[14].mobility.initialY = 80m
*.host[15].mobility.initialX = 160m
*.host[15].mobility.initialY = 80m
*.host[16].mobility.initialX = 200m
*.host[16].mobility.initialY = 80m
*.host[17].mobility.initialX = 240m
*.host[17].mobility.initialY = 80m

# Row 3 (Y = 120m)
*.host[18].mobility.initialX = 40m
*.host[18].mobility.initialY = 120m
*.host[19].mobility.initialX = 80m
*.host[19].mobility.initialY = 120m
# host[20] is not placed here because the sink uses this central position
#*.host[20].mobility.initialX = 120m
#*.host[20].mobility.initialY = 120m
*.host[21].mobility.initialX = 160m
*.host[21].mobility.initialY = 120m
*.host[22].mobility.initialX = 200m
*.host[22].mobility.initialY = 120m
*.host[23].mobility.initialX = 240m
*.host[23].mobility.initialY = 120m

# Row 4 (Y = 160m)
*.host[24].mobility.initialX = 40m
*.host[24].mobility.initialY = 160m
*.host[25].mobility.initialX = 80m
*.host[25].mobility.initialY = 160m
*.host[26].mobility.initialX = 120m
*.host[26].mobility.initialY = 160m
*.host[27].mobility.initialX = 160m
*.host[27].mobility.initialY = 160m
*.host[28].mobility.initialX = 200m
*.host[28].mobility.initialY = 160m
*.host[29].mobility.initialX = 240m
*.host[29].mobility.initialY = 160m

# Row 5 (Y = 200m)
*.host[30].mobility.initialX = 40m
*.host[30].mobility.initialY = 200m
*.host[31].mobility.initialX = 80m
*.host[31].mobility.initialY = 200m
*.host[32].mobility.initialX = 120m
*.host[32].mobility.initialY = 200m
*.host[33].mobility.initialX = 160m
*.host[33].mobility.initialY = 200m
*.host[34].mobility.initialX = 200m
*.host[34].mobility.initialY = 200m
*.host[35].mobility.initialX = 240m
*.host[35].mobility.initialY = 200m

# Normal UDP traffic configuration
**.host[*].numApps = 1
**.host[*].app[0].typename = "UdpBasicApp"
**.host[*].app[0].destAddresses = "sink[0]"
**.host[*].app[0].destPort = 1000
**.host[*].app[0].messageLength = 56B
**.host[*].app[0].sendInterval = 55s
**.host[*].app[0].startTime = uniform(0s,90s)
**.host[*].app[0].stopTime = 3550s

**.sink[*].numApps = 1
**.sink[*].app[0].typename = "UdpSink"
**.sink[*].app[0].localPort = 1000

# Energy model configuration
**.host[*].energyStorage.typename = "IdealEpEnergyStorage"
**.host[*].energyStorage.nominalCapacity = 1000J
**.host[*].energyStorage.initialCapacity = 1000J
**.host[*].wlan[*].radio.energyConsumer.typename = "StateBasedEpEnergyConsumer"

**.Attack[*].energyStorage.typename = "IdealEpEnergyStorage"
**.Attack[*].energyStorage.nominalCapacity = 1000J
**.Attack[*].energyStorage.initialCapacity = 1000J
**.Attack[*].wlan[*].radio.energyConsumer.typename = "StateBasedEpEnergyConsumer"

# Visualization settings
*.visualizer.dataLinkVisualizer[*].displayLinks = true
*.visualizer.physicalLinkVisualizer[*].displayLinks = true
*.visualizer.mediumVisualizer.displayCommunicationRanges = true
*.visualizer.networkRouteVisualizer.displayRoutes = true

*.visualizer.*.numDataLinkVisualizers = 4
*.visualizer.*.dataLinkVisualizer[*].displayLinks = true
*.visualizer.*.dataLinkVisualizer[*].activityLevel = "peer"

*.visualizer.*.dataLinkVisualizer[0].packetFilter = "UDP*"
*.visualizer.*.dataLinkVisualizer[0].*Color = "blue"

*.visualizer.*.dataLinkVisualizer[1].packetFilter = "DIO* or DIS* or DAO*"
*.visualizer.*.dataLinkVisualizer[1].*Color = "green"

*.visualizer.*.dataLinkVisualizer[2].packetFilter = "RERR* or ICMP*"
*.visualizer.*.dataLinkVisualizer[2].*Color = "red"

*.visualizer.*.dataLinkVisualizer[3].packetFilter = "UDP*"
*.visualizer.*.dataLinkVisualizer[3].*Color = "orange"

# Metrics and output recording
**.app[*].packetSent:count.record = true
**.app[*].packetReceived:count.record = true
**.host[*].app[0].recordStats = true
**.sink[*].app[0].recordStats = true

**.host[*].app[0].endToEndDelay.result-recording-modes = all
**.sink[*].app[0].endToEndDelay.result-recording-modes = all
**.endToEndDelay:vector.record = true
**.endToEndDelay:stats.record = true

**.sink[*].app[0].throughput.result-recording-modes = all
**.throughput:vector.record = true
**.throughput:stats.record = true

**.energyStorage.remainingEnergyCapacity.result-recording-modes = all
**.energyStorage.energyConsumption.result-recording-modes = all

**.scalar-recording = true
**.vector-recording = true

output-scalar-file = ${resultdir}/${configname}-${runnumber}.sca
output-vector-file = ${resultdir}/${configname}-${runnumber}.vec


# Simulation scenarios

[Config _MP2P_Normal_36]
sim-time-limit = 3600s

**.host[*].numApps = 1
**.host[*].app[0].typename = "UdpBasicApp"
**.host[*].app[0].destAddresses = "sink[0]"
**.host[*].app[0].destPort = 1000
**.host[*].app[0].messageLength = 56B
**.host[*].app[0].sendInterval = 55s
**.host[*].app[0].startTime = uniform(0s,90s)

**.sink[*].numApps = 1
**.sink[*].app[0].typename = "UdpSink"
**.sink[*].app[0].localPort = 1000

**.host[*].app[0].recordStats = true
**.host[*].app[0].endToEndDelay.result-recording-modes = all
**.sink[*].app[0].recordStats = true
**.sink[*].app[0].throughput.result-recording-modes = all

**.host[*].energyStorage.typename = "IdealEpEnergyStorage"
**.host[*].energyStorage.nominalCapacity = 1000J   
**.host[*].energyStorage.initialCapacity = 1000J   
**.host[*].wlan[*].radio.energyConsumer.typename = "StateBasedEpEnergyConsumer"
**.host[*].energyStorage.remainingEnergyCapacity.result-recording-modes = all
**.host[*].energyStorage.energyConsumption.result-recording-modes = all

# Scenario 1: UDP flooding from host[4]
[Config _MP2P_Static_FLOODING_36]
extends = _MP2P_Normal_36
description = "UDP flooding scenario using host[4] as the traffic source"
sim-time-limit = 3600s

**.host[4].numApps = 2
**.host[4].app[1].typename = "UdpBasicApp"
**.host[4].app[1].destAddresses = "sink[0]"
**.host[4].app[1].destPort = 1000
**.host[4].app[1].messageLength = 152B
**.host[4].app[1].startTime = 900s
**.host[4].app[1].stopTime = 3550s
**.host[4].app[1].sendInterval = 0.02s

**.host[4].app[1].packetSent:count.record = true
**.host[4].app[1].recordStats = true
**.sink[*].app[0].packetReceived:count.record = true
**.sink[*].app[0].recordStats = true
**.sink[*].app[0].throughput.result-recording-modes = all
**.scalar-recording = true
**.vector-recording = true

# Scenario 2: manipulated backoff at host[4]
[Config _MP2P_Static_BACKOFF_36]
extends = _MP2P_Normal_36
description = "Manipulated MAC backoff scenario configured at host[4]"
sim-time-limit = 3600s

**.host[*].numApps = 1
**.host[*].app[0].typename = "UdpBasicApp"
**.host[*].app[0].destPort = 1000
**.host[*].app[0].messageLength = 56B
**.host[*].app[0].sendInterval = 55s
**.host[*].app[0].startTime = uniform(300s,400s)
**.host[*].app[0].stopTime = 3550s

**.sink[*].numApps = 1
**.sink[*].app[0].typename = "UdpSink"
**.sink[*].app[0].localPort = 1000

**.host[4].numApps = 1
**.host[4].wlan[0].mac.macMinBE = 0
**.host[4].wlan[0].mac.macMaxBE = 0
**.host[4].wlan[0].mac.macMaxCSMABackoffs = 0
**.host[4].app[0].sendInterval = 5s
**.host[4].app[0].messageLength = 152B
**.host[4].app[0].startTime = 600s

# Scenario 3: blackhole behavior using host[4]
[Config _MP2P_Static_BLACKHOLE_36]
extends = _MP2P_Normal_36
description = "Blackhole scenario where part of the traffic is redirected to host[4]"
sim-time-limit = 3600s

**.host[*].numApps = 1
**.host[*].app[0].typename = "UdpBasicApp"
**.host[*].app[0].destPort = 1000
**.host[*].app[0].messageLength = 56B
**.host[*].app[0].sendInterval = 55s
**.host[*].app[0].startTime = uniform(300s,400s)
**.host[*].app[0].stopTime = 3550s

**.sink[*].numApps = 1
**.sink[*].app[0].typename = "UdpSink"
**.sink[*].app[0].localPort = 1000

# Traffic redirection used to emulate packet loss through the blackhole node
**.host[0..3].app[0].destAddresses = "host[4]"
**.host[5..25].app[0].destAddresses = "host[4]"  
**.host[26..35].app[0].destAddresses = "sink[0]" 

**.host[4].numApps = 0

# Scenario 4: wormhole link between host[4] and host[30]
[Config _MP2P_Static_WORMHOLE_36]
extends = _MP2P_Normal_36
description = "Wormhole scenario with an additional link between host[4] and host[30]"
sim-time-limit = 3600s

**.host[*].app[0].typename = "UdpBasicApp"
**.host[*].app[0].destAddresses = "sink[0]"
**.host[*].app[0].destPort = 1000
**.host[*].app[0].messageLength = 56B
**.host[*].app[0].sendInterval = 55s
**.host[*].app[0].startTime = uniform(300s,400s)
**.host[*].app[0].stopTime = 3550s

**.sink[*].numApps = 1
**.sink[*].app[0].typename = "UdpSink"
**.sink[*].app[0].localPort = 1000

# Additional UDP flow used to represent the wormhole link
**.host[4].numApps = 2
**.host[30].numApps = 2

**.host[4].app[1].typename = "UdpBasicApp"
**.host[4].app[1].destAddresses = "host[30]"
**.host[4].app[1].destPort = 2000
**.host[4].app[1].messageLength = 120B
**.host[4].app[1].sendInterval = 0.5s
**.host[4].app[1].startTime = 900s
**.host[4].app[1].stopTime = 3550s

**.host[30].app[1].typename = "UdpSink"
**.host[30].app[1].localPort = 2000

**.host[4].app[1].packetSent:count.record = true
**.host[30].app[1].packetReceived:count.record = true
**.sink[*].app[0].packetReceived:count.record = true
**.app[*].packetSent:count.record = true
**.app[*].packetReceived:count.record = true